services:
  postgres-db:
    image: postgres:17-alpine
    container_name: nexus-postgres-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    networks:
      - nexus-network

volumes:
  nexus_data:
    name: nexus_data

networks:
  nexus-network:
    name: nexus-network
    driver: bridge